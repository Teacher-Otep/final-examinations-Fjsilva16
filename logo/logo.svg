<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Left to Right Gradient (Purple to Blue) -->
    <linearGradient id="gradLR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8e44ad;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    
    <!-- Top to Bottom Gradient for DB (Light Blue to Dark Blue) -->
    <linearGradient id="gradDB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c2833;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(200, 180)">
    <!-- Outer Ring -->
    <g stroke="url(#gradLR)" stroke-width="12" stroke-linecap="round" fill="none">
      <!-- Top arc -->
      <path d="M-30,-130 A130,130 0 0,1 30,-130" />
      <!-- Bottom arc -->
      <path d="M-30,130 A130,130 0 0,0 30,130" />
      <!-- Left arc -->
      <path d="M-130,-40 A130,130 0 0,0 -90,95" />
      <!-- Right arc -->
      <path d="M130,-40 A130,130 0 0,1 90,95" />
    </g>

    <!-- Left Node -->
    <circle cx="-165" cy="15" r="14" fill="#8e44ad" />
    <path d="M-151,15 L-110,15 L-110,-5 L-80,-5" stroke="#8e44ad" stroke-width="8" fill="none" stroke-linejoin="round"/>

    <!-- Right Node -->
    <circle cx="165" cy="15" r="14" fill="#3498db" />
    <path d="M151,15 L110,15 L110,35 L80,35" stroke="#3498db" stroke-width="8" fill="none" stroke-linejoin="round"/>

    <!-- Database Icon -->
    <g transform="translate(0, -30)">
      <!-- Bottom cylinder -->
      <path d="M-65,60 L-65,95 A65,18 0 0,0 65,95 L65,60 Z" fill="url(#gradDB)" />
      <circle cx="45" cy="85" r="6" fill="#fff" />
      <path d="M-65,60 A65,18 0 0,0 65,60" stroke="#fff" stroke-width="4" fill="none" />

      <!-- Middle cylinder -->
      <path d="M-65,15 L-65,50 A65,18 0 0,0 65,50 L65,15 Z" fill="url(#gradDB)" />
      <circle cx="45" cy="40" r="6" fill="#fff" />
      <path d="M-65,15 A65,18 0 0,0 65,15" stroke="#fff" stroke-width="4" fill="none" />

      <!-- Top cylinder -->
      <path d="M-65,-30 L-65,5 A65,18 0 0,0 65,5 L65,-30 Z" fill="url(#gradDB)" />
      <circle cx="45" cy="-5" r="6" fill="#fff" />
      
      <!-- Top lid -->
      <ellipse cx="0" cy="-30" rx="65" ry="18" fill="#2980b9" />
    </g>
  </g>

  <!-- Text -->
  <text x="200" y="360" font-family="'Segoe UI', 'Outfit', sans-serif" font-size="44" font-weight="500" fill="#1b263b" text-anchor="middle">Florich Joy Silva</text>

  <!-- Bottom Line -->
  <g transform="translate(200, 385)">
    <line x1="-160" y1="0" x2="-35" y2="0" stroke="url(#gradLR)" stroke-width="2" />
    <line x1="35" y1="0" x2="160" y2="0" stroke="url(#gradLR)" stroke-width="2" />
    
    <!-- Barbell -->
    <circle cx="-20" cy="0" r="7" fill="#8e44ad" />
    <circle cx="20" cy="0" r="7" fill="#3498db" />
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#2980b9" stroke-width="4" />
  </g>
</svg>
